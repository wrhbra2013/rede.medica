<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rede.Médica - Agendamentos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="mobile-header">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-title">Rede.Médica</span>
    <button class="btn btn-sm btn-primary mobile-btn-novo" onclick="abrirModal()">+</button>
  </div>

  <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Rede.Médica</h1>
      <span class="subtitle">Agendamentos</span>
    </div>
    <ul class="nav-list">
      <li><a href="#" class="nav-item active" data-page="dashboard"><span class="icon">📊</span> <span>Dashboard</span></a></li>
      <li><a href="#" class="nav-item" data-page="agendamentos"><span class="icon">📅</span> <span>Agendamentos</span></a></li>
      <li><a href="#" class="nav-item" data-page="medicos"><span class="icon">👨‍⚕️</span> <span>Médicos</span></a></li>
      <li><a href="#" class="nav-item" data-page="pacientes"><span class="icon">🧑‍🤝‍🧑</span> <span>Pacientes</span></a></li>
      <li><a href="#" class="nav-item" data-page="servicos"><span class="icon">⚕️</span> <span>Serviços</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="api-status" id="apiStatus">
        <span class="status-dot"></span>
        <span class="status-text">Conectando...</span>
      </div>
    </div>
  </nav>

  <main class="content">
    <header class="content-header">
      <div class="header-left">
        <h2 id="pageTitle">Dashboard</h2>
      </div>
      <div class="header-right">
        <button class="btn btn-primary" id="btnNovo" onclick="abrirModal()">+ Novo</button>
      </div>
    </header>

    <div class="page-content" id="pageContent">
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay" onclick="fecharModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">Novo Registro</h3>
        <button class="modal-close" onclick="fecharModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" id="btnSalvar" onclick="salvarRegistro()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
